<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NarrativeOS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #080808;
      color: #f1f1f1;
      min-height: 400px;
    }

    /* ─── Header ─────────────────────────── */
    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo {
      width: 32px; height: 32px; background: #814ac8;
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      font-size: 16px; box-shadow: 0 0 16px rgba(129,74,200,0.4); flex-shrink: 0;
    }
    .header-text h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
    .header-text p  { font-size: 10px; color: #555; margin-top: 1px; }

    /* ─── Status ─────────────────────────── */
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 18px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .status-left { display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.connected    { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.5); }
    .status-dot.disconnected { background: #555; }
    #status-text   { font-size: 11px; color: #666; font-weight: 500; }
    #replies-today { font-size: 10px; color: #444; font-weight: 600; }

    /* ─── Body ───────────────────────────── */
    .body { padding: 14px 16px; }

    /* ─── Form Elements ──────────────────── */
    .section-label {
      font-size: 9px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.1em; color: #444; margin-bottom: 5px;
    }
    .form-group { margin-bottom: 9px; }

    input[type="email"], input[type="password"], select {
      width: 100%; padding: 9px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px; color: #f1f1f1; font-size: 12px;
      outline: none; transition: border-color 0.2s; font-family: inherit;
    }
    input:focus, select:focus { border-color: rgba(129,74,200,0.5); }
    input::placeholder { color: #333; }
    select { cursor: pointer; }
    select option { background: #111; color: #f1f1f1; }

    /* ─── Buttons ────────────────────────── */
    .btn {
      width: 100%; padding: 9px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-primary { background: #814ac8; color: white; box-shadow: 0 0 16px rgba(129,74,200,0.2); }
    .btn-primary:hover { background: #9b6cd8; }
    .btn-primary:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; box-shadow: none; }
    .btn-danger { background: rgba(239,68,68,0.08); color: #fca5a5; border: 1px solid rgba(239,68,68,0.15); margin-top: 5px; }
    .btn-danger:hover { background: rgba(239,68,68,0.15); }

    /* ─── Messages ───────────────────────── */
    .message { font-size: 11px; min-height: 14px; margin-top: 4px; }
    .message.error   { color: #f87171; }
    .message.success { color: #4ade80; }

    /* ─── Loading ────────────────────────── */
    #loading {
      display: none; align-items: center; justify-content: center;
      gap: 6px; padding: 6px; font-size: 11px; color: #555;
    }
    .spinner {
      width: 13px; height: 13px; border: 2px solid #222; border-top-color: #814ac8;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── User Card ──────────────────────── */
    .user-card {
      background: rgba(129,74,200,0.06); border: 1px solid rgba(129,74,200,0.15);
      border-radius: 10px; padding: 10px 12px; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .user-info-label { font-size: 9px; color: #555; font-weight: 700; text-transform: uppercase; }
    .user-email      { font-size: 12px; font-weight: 600; color: #c4a0f0; margin-top: 1px; }

    /* ─── Agent Selector ─────────────────── */
    .agent-section { margin-bottom: 10px; }
    .no-agents-msg {
      font-size: 11px; color: #444; text-align: center;
      padding: 12px; background: rgba(255,255,255,0.02);
      border: 1px dashed rgba(255,255,255,0.05); border-radius: 8px; line-height: 1.6;
    }
    .no-agents-msg a { color: #814ac8; text-decoration: none; }

    /* ─── Stats ──────────────────────────── */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
    .stat-box {
      padding: 8px 10px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
      border-radius: 8px;
    }
    .stat-label { font-size: 9px; color: #444; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; }
    .stat-value { font-size: 20px; font-weight: 800; color: #f1f1f1; margin-top: 1px; }

    /* ─── Toggle ─────────────────────────── */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px; margin-bottom: 6px;
    }
    .toggle-label { font-size: 12px; font-weight: 600; color: #ccc; }
    .toggle-sub   { font-size: 10px; color: #444; margin-top: 1px; }
    .switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .switch input { display: none; }
    .switch-slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #2a2a2a; border-radius: 20px; transition: 0.25s;
    }
    .switch-slider:before {
      content: ''; position: absolute; width: 14px; height: 14px;
      background: white; border-radius: 50%; top: 3px; left: 3px; transition: 0.25s;
    }
    .switch input:checked + .switch-slider { background: #814ac8; }
    .switch input:checked + .switch-slider:before { transform: translateX(16px); }

    /* ─── Divider ────────────────────────── */
    .divider { height: 1px; background: rgba(255,255,255,0.04); margin: 10px 0; }

    /* ─── Footer ─────────────────────────── */
    .footer {
      padding: 9px 18px; border-top: 1px solid rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-link { font-size: 10px; color: #333; cursor: pointer; transition: color 0.2s; }
    .footer-link:hover { color: #814ac8; }
    .version { font-size: 10px; color: #222; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">✦</div>
    <div class="header-text">
      <h1>NarrativeOS</h1>
      <p>AI Agents for X</p>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-left">
      <div id="status-dot" class="status-dot disconnected"></div>
      <span id="status-text">Not signed in</span>
    </div>
    <span id="replies-today"></span>
  </div>

  <div class="body">

    <!-- ─── LOGIN SECTION ─── -->
    <div id="login-section">
      <div class="form-group">
        <div class="section-label">Email</div>
        <input type="email" id="email-input" placeholder="you@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <div class="section-label">Password</div>
        <input type="password" id="password-input" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary" id="login-btn">Sign In</button>
      <div id="loading">
        <div class="spinner"></div>&nbsp;Signing in...
      </div>
      <div id="error-message" class="message"></div>
      <p style="font-size:10px;color:#333;margin-top:10px;line-height:1.6;">
        Sign in with your <strong style="color:#555">NarrativeOS</strong> account.
      </p>
    </div>

    <!-- ─── AUTHENTICATED SECTION ─── -->
    <div id="authenticated-section" style="display:none;">

      <div class="user-card">
        <div>
          <div class="user-info-label">Signed in as</div>
          <div class="user-email" id="user-email-display">...</div>
        </div>
      </div>

      <!-- Agent selector -->
      <div class="agent-section">
        <div class="section-label">Active Agent</div>
        <select id="agent-select" style="display:none;"></select>
        <div id="no-agents-msg" class="no-agents-msg" style="display:none;">
          No agents yet.<br>
          <a href="https://project-x-lilac.vercel.app/agents" target="_blank">Create one on NarrativeOS →</a>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">Replies Today</div>
          <div class="stat-value" id="stat-replies">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Posts Scanned</div>
          <div class="stat-value" id="stat-scanned">0</div>
        </div>
      </div>

      <!-- Toggle -->
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Auto-Reply</div>
          <div class="toggle-sub" id="toggle-sub-text">Select an agent to enable</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="auto-reply-toggle">
          <span class="switch-slider"></span>
        </label>
      </div>

      <div class="divider"></div>
      <div id="error-message-auth" class="message" style="margin-bottom:6px;"></div>
      <button class="btn btn-danger" id="logout-btn">Sign Out</button>
    </div>

  </div>

  <div class="footer">
    <span class="footer-link" id="options-link">Options</span>
    <span class="version">v2.0.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
